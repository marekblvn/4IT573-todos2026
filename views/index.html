<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo seznam</title>
  </head>
  <body>
    <header style="display: flex; justify-content: space-between; align-items: center; gap: 16px;">
      <h1 style="margin: 0;">&#9989; Todo seznam</h1>

      <% if (currentUser) { %>
        <div style="display: flex; align-items: center; gap: 12px;">
          <p style="margin: 0;">Přihlášený uživatel: <strong><%= currentUser.name %></strong></p>
          <form method="post" action="/logout">
            <button type="submit">Odhlásit</button>
          </form>
        </div>
      <% } else { %>
        <div style="display: flex; align-items: center; gap: 8px;">
          <form method="get" action="/login">
            <button type="submit">Přihlásit</button>
          </form>
          <form method="get" action="/register">
            <button type="submit">Registrovat</button>
          </form>
        </div>
      <% } %>
    </header>

    <hr />

    <div id="todo-list"><%- include("_todos.html") %></div>

    <hr />

    <fieldset>
      <legend><strong>Přidat nový úkol</strong></legend>
      <form method="post" action="/add-todo">
        <div style="max-width: 240px; display: grid; row-gap: 8px;">
          <div style="display: grid;">
            <label for="title">Název úkolu:</label>
            <input
              id="title"
              name="title"
              placeholder="Co je potřeba udělat?"
            />
          </div>
          <div style="display: grid;">
            <label for="">Priorita</label>
            <select id="priority" name="priority">
              <% for (const priority of priorities) { %>
                <option
                value="<%= priority %>"
                <%= priority === defaultPriority ? "selected" : "" %>
                >
                <%= priority %>
              </option>
              <% } %>
            </select>
          </div>
          <button type="submit" style="height: 32px;">&#43; Přidat</button>
        </div>
      </form>
    </fieldset>
    <script>
      const ws = new WebSocket(`ws://${location.host}/ws`);
      ws.addEventListener("open", () => {
        console.log("WS Open");
        ws.send("Hello, World!");
      });
      ws.addEventListener("message", (ev) => {
        const data = JSON.parse(ev.data);
        if (data.type === "todos") {
          const todoList = document.getElementById("todo-list");
          todoList.innerHTML = data.html;
        }
      });
    </script>
  </body>
</html>
