<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><%= todo.title %> - Todo detail</title>
  </head>
  <body>
    <p><a href="/">&larr; Zpět na seznam</a></p>
    <div id="todo-detail" data-todo-id="<%= todo.id %>">
      <%- include("_todo-detail.html", { todo, priorities }) %>
    </div>

    <script>
      const ws = new WebSocket(`ws://${location.host}/ws`);

      const detailEl = document.getElementById("todo-detail");
      const currentTodoId = Number(detailEl.dataset.todoId);

      ws.addEventListener("message", (event) => {
        const data = JSON.parse(event.data);

        if (data.type !== "todo-detail") return;
        if (Number(data.todoId) !== currentTodoId) return;

        detailEl.innerHTML = data.html;

        if (data.deleted) {
          document.title = "Todočko bylo smazáno";
        } else if (data.title) {
          document.title = `${data.title} - Todo detail`;
        }
      });
    </script>
  </body>
</html>
